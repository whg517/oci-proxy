name = "oci-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# ─── Custom Domains ────────────────────────────────────────────────
# This file is a template — it does NOT contain real domain names.
#
# For deployment, copy this file to wrangler-deploy.toml and fill in
# your actual domains in the routes below. wrangler deploy -c wrangler-deploy.toml
# will automatically create Custom Domains and DNS records.
#
# wrangler-deploy.toml is gitignored and should never be committed.
#
# routes = [
#   { pattern = "docker.your-domain.com", custom_domain = true },
#   { pattern = "ghcr.your-domain.com",   custom_domain = true },
#   { pattern = "gcr.your-domain.com",    custom_domain = true },
#   { pattern = "k8s.your-domain.com",    custom_domain = true },
# ]

[vars]
REGISTRIES = "ghcr,gcr,k8s"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
