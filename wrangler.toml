name = "oci-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# ─── Custom Domains ────────────────────────────────────────────────
# Custom domains are managed via Cloudflare Dashboard (not in this file
# to keep real domain names out of version control).
#
# In Dashboard → Workers → oci-proxy → Settings → Triggers → Custom Domains, add:
#   docker.<your-domain>   → always enabled
#   ghcr.<your-domain>     → enabled when REGISTRIES contains "ghcr"
#   gcr.<your-domain>      → enabled when REGISTRIES contains "gcr"
#   k8s.<your-domain>      → enabled when REGISTRIES contains "k8s"

[vars]
REGISTRIES = "ghcr,gcr,k8s"

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
