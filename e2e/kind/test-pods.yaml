# Template test pods for manual verification
# Usage: kubectl apply -f test-pods.yaml

apiVersion: v1
kind: Pod
metadata:
  name: oci-proxy-test-nginx
  labels:
    app: oci-proxy-test
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      command: ["sleep", "3600"]
---
apiVersion: v1
kind: Pod
metadata:
  name: oci-proxy-test-redis
  labels:
    app: oci-proxy-test
spec:
  containers:
    - name: redis
      image: redis:alpine
      command: ["sleep", "3600"]
